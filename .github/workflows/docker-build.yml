name: Docker Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (simple)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: bankapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (multistage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.multistage
          push: false
          tags: bankapp:multistage
          cache-from: type=gha
          cache-to: type=gha,mode=max
