name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_run:
    workflows: [Docker Build and Push]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /opt/bankapp || exit 1
            docker pull ghcr.io/${{ github.repository_owner }}/bankapp:latest
            docker compose pull
            docker compose up -d --force-recreate bankapp
            docker image prune -f
        continue-on-error: true

      - name: Health check
        if: success()
        run: |
          echo "Deployment completed. Configure DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY in repository secrets."
          echo "Server URL: ${{ secrets.DEPLOY_URL || 'Not configured' }}"
