name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
     
        script:
         rm -rf ~/bankapp/docker-compose.yml
      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
         host: ${{ secrets.EC2_SSH_HOST }}
         username: ${{ secrets.EC2_SSH_USERNAME }}
         key: ${{ secrets.EC2_SSH_KEY }}
         source: docker-compose.yml
         target: ~/bankapp
        overwrite: true

        script: |
            echo "Connected to EC2"

            # Update system
            sudo apt update -y

            # Install Docker if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo apt install -y docker.io
            fi

            # Start docker
            sudo systemctl start docker
            sudo systemctl enable docker

            # Add user to docker group
            sudo usermod -aG docker $USER

            # Install Docker Compose if not installed
            if ! command -v docker-compose &> /dev/null
            then
              echo "Installing Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Login to DockerHub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Create project directory
            mkdir -p ~/bankapp
            cd ~/bankapp

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/bankapp:latest

            # Create docker-compose.yml if not exists

            # Run container
            docker compose down
            docker compose pull
            docker compose up -d

            # Remove unused images
            docker image prune -f

            echo "Deployment Completed Successfully"