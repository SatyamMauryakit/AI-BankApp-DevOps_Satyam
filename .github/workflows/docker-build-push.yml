name: Docker Build Scan Push

on:
  workflow_call:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete existing local images
        run: |
          # Clean up old images
            sudo docker image prune -a -f

      # Build image locally
      - name: Build Docker Image
        run: |
           docker build \
           -f Dockerfile.multistage \
           -t ${{ secrets.DOCKER_USERNAME }}/bankapp:${{ steps.vars.outputs.TAG }} \
           -t ${{ secrets.DOCKER_USERNAME }}/bankapp:latest \
           .

      # Scan image with Trivy
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/bankapp:${{ steps.vars.outputs.TAG }}
          format: table
          exit-code: 0
          ignore-unfixed: true

      # Push image after scan
      - name: Push Docker Image
        run: |
         docker push ${{ secrets.DOCKER_USERNAME }}/bankapp:${{ steps.vars.outputs.TAG }}
         docker push ${{ secrets.DOCKER_USERNAME }}/bankapp:latest